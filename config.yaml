samples:
  smoke:
    libtype: "STRANDED"
    data:
      - R1: "internal_files/fastq/PE/smoke_run1_R1.fq.gz"
        R2: "internal_files/fastq/PE/smoke_run1_R2.fq.gz"

reference:
  genome:
    fa: "ref/genome/smoke.fa"
    gtf: "/dev/null"
    hisat3n: "internal_files/ref/genome/index"

markdup: false
base_change: "A,G"

path:
  hisat3n: "hisat3n"
  samtools: "samtools"
  cutseq: "cutseq"
  markdup: "markdup"
  multiqc: "multiqc"
  python: "python"
